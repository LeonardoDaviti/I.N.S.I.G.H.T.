version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: insight-db
    environment:
      POSTGRES_USER: ${DB_USER:-insight}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-insight}
      POSTGRES_DB: ${DB_NAME:-insight}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U insight"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: insight-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    ports:
      - "8000:8000"
    command: |
      sh -c "
        python insight_core/db/migrate.py &&
        python insight_core/db/seed_sources.py &&
        uvicorn main:app --host 0.0.0.0 --port 8000
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ingestion:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: insight-ingestion
    depends_on:
      backend:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
    command: |
      sh -c "
        sleep 10 &&
        python insight_core/scripts/ingest.py &&
        echo 'Ingestion complete, container will exit'
      "
    restart: "no"  # Run once

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    container_name: insight-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: http://localhost:8000

volumes:
  postgres_data:
    driver: local